name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Install Qt system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libegl1 libgl1 libglib2.0-0 \
            libfontconfig1 libxcb-cursor0 \
            libdbus-1-3 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-xinerama0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
          DISPLAY: ""
        run: pytest --tb=short --cov=photon --cov-report=term-missing

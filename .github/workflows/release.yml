name: Build and Release (Windows)

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install Pillow pyinstaller

      - name: Generate app icon
        run: python scripts/generate_icon.py

      - name: Build with PyInstaller
        run: pyinstaller photon.spec --clean --noconfirm

      - name: Verify build output
        run: |
          if (!(Test-Path "dist\Photon\Photon.exe")) {
            Write-Error "Build failed: Photon.exe not found in dist\Photon\"
            exit 1
          }
          Write-Output "Build verified: Photon.exe exists"

      - name: Create distribution zip
        run: |
          $tag = "${{ github.ref_name }}"
          $zipName = "Photon-$tag-windows.zip"
          Compress-Archive -Path "dist\Photon\*" -DestinationPath "dist\$zipName"
          Write-Output "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Create GitHub Release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          name: "Photon ${{ github.ref_name }}"
          body: |
            ## Photon ${{ github.ref_name }}

            ### Installation (Windows)
            1. Download `Photon-${{ github.ref_name }}-windows.zip` below
            2. Extract the zip to any folder
            3. Open the extracted folder and double-click `Photon.exe`

            > **First launch note:** Windows may show a SmartScreen warning
            > ("Windows protected your PC"). This is normal for unsigned apps.
            > Click **More info** → **Run anyway** to launch Photon.

            ### What's new
            See [CHANGELOG.md](CHANGELOG.md) for details.
          files: dist/Photon-${{ github.ref_name }}-windows.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
